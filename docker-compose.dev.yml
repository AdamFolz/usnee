version: '3.8'

# Dev mode: backend only (no bot, no nginx), frontend runs locally via `npm run dev`
# Usage: docker-compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: usnee
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: usnee
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usnee"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://usnee:dev@postgres/usnee
      REDIS_URL: redis://redis:6379
      BOT_TOKEN: dev_token
      ENCRYPTION_KEY: dev_encryption_key_123456789012345678901234567890
      SECRET_KEY: dev_secret_key_123456789012345678901234567890
      WEBAPP_URL: http://localhost:5173
      WEBHOOK_URL: http://localhost:8000
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","http://localhost:8080","http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
